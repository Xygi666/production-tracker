<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2c3e50">
  <title>Учёт продукции</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png" sizes="192x192">
  <link rel="icon" href="icon-512.png" sizes="512x512">
  <!-- добавлен параметр версии, чтобы PWA подтянул новый CSS -->
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body data-theme="classic">
  <div class="app">
    <header class="header">
      <div class="header__container">
        <div class="header__brand">
          <h1 class="header__title">📊 Учёт продукции</h1>
          <div class="header__subtitle">Доход за месяц: <span id="monthSumHeader">0 ₽</span></div>
          <div class="header__subtitle">На руки (итог): <span id="finalAmountHeader">0 ₽</span></div>
        </div>
        <div class="header__actions">
          <button id="settingsBtn" class="btn btn--sm btn--outline">⚙️ Настройки</button>
          <button id="exportJsonBtn" class="btn btn--sm btn--outline">💾 Экспорт JSON</button>
          <button id="reloadBtn" class="btn btn--sm btn--outline">🔄</button>
        </div>
      </div>
    </header>

    <nav class="nav">
      <div class="nav__container">
        <button class="nav__tab nav__tab--active" data-tab="records">📝 Учёт</button>
        <button class="nav__tab" data-tab="statistics">📈 Статистика</button>
        <button class="nav__tab" data-tab="history">📋 История</button>
      </div>
    </nav>

    <main class="main">
      <div class="main__container">
        <section class="screen screen--active" data-screen="records">
          <div class="form-group">
            <label for="productSearch">Продукт</label>
            <div class="product-search">
              <input id="productSearch" class="form-control" type="text" placeholder="Начните вводить название">
              <button id="clearSearchBtn" class="search-clear-btn hidden">×</button>
              <div id="productSuggestions" class="suggestions hidden"></div>
            </div>
          </div>
          <div class="form-group">
            <label for="quantityInput">Количество (шт.) — можно вводить отрицательные для брака</label>
            <div class="quantity-control">
              <button id="decreaseBtn" class="btn btn--round">−</button>
              <input id="quantityInput" class="form-control" type="number" step="1" inputmode="numeric" placeholder="1 или -1 для брака">
              <button id="increaseBtn" class="btn btn--round">+</button>
            </div>
          </div>
          <div id="presetsContainer" class="presets"></div>
          <div class="form-group">
            <div class="sum-display">
              <span>Сумма: </span><span id="sumAmount" class="sum-amount">0 ₽</span>
            </div>
          </div>
          <button id="addRecordBtn" class="btn btn--primary btn--full">Добавить запись</button>
          <div class="records-list">
            <div class="list-header">
              <h3>Записи текущего месяца</h3>
              <button id="exportCsvBtn" class="btn btn--sm btn--outline">📊 Экспорт CSV</button>
            </div>
            <div id="recordsList" class="records-items"></div>
          </div>
        </section>

        <section class="screen" data-screen="statistics">
          <h2>Статистика за текущий месяц</h2>
          <div id="statsGrid" class="stats-grid"></div>
        </section>

        <section class="screen" data-screen="history">
          <div class="history-header">
            <h2>История действий</h2>
            <div class="history-filters">
              <input id="filterDate" class="form-control" type="date">
              <select id="filterAction" class="form-control">
                <option value="">Все действия</option>
                <option value="add_record">Добавление записи</option>
                <option value="delete_record">Удаление записи</option>
                <option value="add_product">Добавление продукта</option>
                <option value="edit_product">Изменение продукта</option>
                <option value="delete_product">Удаление продукта</option>
                <option value="settings">Изменение настроек</option>
              </select>
              <button id="exportHistoryBtn" class="btn btn--sm btn--outline">📄 Экспорт истории</button>
            </div>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- Настройки -->
  <div id="settingsModal" class="modal">
    <div class="modal__backdrop"></div>
    <div class="modal__content">
      <div class="modal__header">
        <h2>Настройки</h2>
        <button id="closeSettingsBtn" class="modal__close">×</button>
      </div>
      <div class="modal__body">
        <div class="settings-tabs">
          <button class="settings-tab settings-tab--active" data-tab="salary">Зарплата</button>
          <button class="settings-tab" data-tab="products">Продукты</button>
          <button class="settings-tab" data-tab="general">Общие</button>
          <button class="settings-tab" data-tab="backup">Бэкап</button>
        </div>
        <div class="settings-content">
          <div class="settings-panel settings-panel--active" data-panel="salary">
            <div class="form-group">
              <label for="baseSalary">Оклад (₽)</label>
              <input id="baseSalary" class="form-control" type="number" min="0" step="100">
            </div>
            <div class="form-group">
              <label for="taxRate">Налог (%)</label>
              <input id="taxRate" class="form-control" type="number" min="0" max="100" step="0.1">
            </div>
            <div class="form-group">
              <label for="advanceAmount">Аванс (₽)</label>
              <input id="advanceAmount" class="form-control" type="number" min="0" step="100">
            </div>
          </div>

          <div class="settings-panel" data-panel="products">
            <div class="products-header">
              <button id="addProductBtn" class="btn btn--primary">Добавить продукт</button>
              <button id="importProductsBtn" class="btn btn--outline">Импорт CSV</button>
              <input id="importProductsFile" type="file" accept=".csv" hidden>
            </div>
            <div id="productsList" class="products-list"></div>
          </div>

          <div class="settings-panel" data-panel="general">
            <div class="form-group">
              <label for="themeSelect">Тема оформления</label>
              <select id="themeSelect" class="form-control">
                <option value="classic">Классическая</option>
                <option value="dark">Тёмная</option>
                <option value="light">Светлая</option>
              </select>
            </div>
            <div class="form-group">
              <label for="presetsInput">Пресеты количества (через запятую)</label>
              <input id="presetsInput" class="form-control" type="text" placeholder="1,5,10,25,50">
            </div>
          </div>

          <div class="settings-panel" data-panel="backup">
            <div class="backup-section">
              <h4>Ручной бэкап</h4>
              <button id="emailBackupBtn" class="btn btn--outline">📧 Email</button>
            </div>
          </div>
        </div>
      </div>
      <div class="modal__footer">
        <button id="saveSettingsBtn" class="btn btn--primary">Сохранить</button>
        <button id="cancelSettingsBtn" class="btn btn--outline">Отмена</button>
      </div>
    </div>
  </div>

  <!-- Продукт -->
  <div id="productModal" class="modal">
    <div class="modal__backdrop"></div>
    <div class="modal__content modal__content--sm">
      <div class="modal__header">
        <h3 id="productModalTitle">Добавить продукт</h3>
        <button id="closeProductBtn" class="modal__close">×</button>
      </div>
      <div class="modal__body">
        <div class="form-group">
          <label for="productNameInput">Название продукта</label>
          <input id="productNameInput" class="form-control" type="text" placeholder="Название">
        </div>
        <div class="form-group">
          <label for="productPriceInput">Цена</label>
          <input id="productPriceInput" class="form-control" type="number" step="0.01" min="0.01" inputmode="decimal" placeholder="0.00">
        </div>
        <div class="form-group">
          <label for="productDefectPriceInput">Цена брака (обычно отрицательная, например -200)</label>
          <input id="productDefectPriceInput" class="form-control" type="number" step="0.01" inputmode="decimal" placeholder="-200">
        </div>
      </div>
      <div class="modal__footer">
        <button id="saveProductBtn" class="btn btn--primary">Сохранить</button>
        <button id="cancelProductBtn" class="btn btn--outline">Отмена</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
